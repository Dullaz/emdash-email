name: Publish

# Publishes to npm via Trusted Publishing (OIDC) when a version tag (v*) is
# pushed. No NPM_TOKEN secret required — npm authenticates this workflow by its
# GitHub identity. You must first configure a Trusted Publisher on the npm
# package settings page (GitHub Actions -> this repo -> workflow "publish.yml").

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run typecheck
      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 22 ships npm 10.
      - run: npm install -g npm@latest
      # Provenance is generated automatically under trusted publishing.
      - run: npm publish --provenance --access public
